name: server

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tasks}
      POSTGRES_USER: ${POSTGRES_USER:-tasks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tasks} -d ${POSTGRES_DB:-tasks}"]
      interval: 5s
      timeout: 3s
      retries: 10

  tasks:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AUTH_TOKEN: ${AUTH_TOKEN:?AUTH_TOKEN must be set}
      DATABASE_URL: postgres://${POSTGRES_USER:-tasks}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-tasks}?sslmode=disable
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      ATTACHMENTS_ENDPOINT: http://rustfs:9000
      ATTACHMENTS_BUCKET: ${RUSTFS_BUCKET:-tasks-attachments}
      ATTACHMENTS_REGION: ${RUSTFS_REGION:-us-east-1}
      ATTACHMENTS_ACCESS_KEY: ${RUSTFS_SERVER_ACCESS_KEY:?RUSTFS_SERVER_ACCESS_KEY must be set}
      ATTACHMENTS_SECRET_KEY: ${RUSTFS_SERVER_SECRET_KEY:?RUSTFS_SERVER_SECRET_KEY must be set}
    ports:
      - "${SERVER_BIND:-0.0.0.0}:${SERVER_PORT:-8400}:8400"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully

  rustfs-permissions:
    image: alpine:3.22
    user: root
    restart: "no"
    command: ["sh", "-c", "chown -R 10001:10001 /data"]
    volumes:
      - rustfs-data:/data

  rustfs:
    image: ${RUSTFS_IMAGE:-rustfs/rustfs:1.0.0-beta.2}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?RUSTFS_ACCESS_KEY must be set}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?RUSTFS_SECRET_KEY must be set}
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: ${RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS:-*}
    ports:
      - "${RUSTFS_CONSOLE_BIND:-127.0.0.1}:${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs-data:/data
    depends_on:
      rustfs-permissions:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  rustfs-init:
    image: minio/mc:latest
    restart: "no"
    entrypoint: ["/bin/sh", "/config/init.sh"]
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?RUSTFS_ACCESS_KEY must be set}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?RUSTFS_SECRET_KEY must be set}
      RUSTFS_SERVER_ACCESS_KEY: ${RUSTFS_SERVER_ACCESS_KEY:?RUSTFS_SERVER_ACCESS_KEY must be set}
      RUSTFS_SERVER_SECRET_KEY: ${RUSTFS_SERVER_SECRET_KEY:?RUSTFS_SERVER_SECRET_KEY must be set}
      RUSTFS_BUCKET: ${RUSTFS_BUCKET:-tasks-attachments}
    volumes:
      - ./server/rustfs/init.sh:/config/init.sh:ro
    depends_on:
      rustfs:
        condition: service_healthy

volumes:
  postgres-data:
  rustfs-data:
